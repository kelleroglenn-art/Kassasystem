<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Färgbutik — Självbetjäning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<script>
  // Verify ZXing actually loaded with the classes we need, before the app tries to use it.
  window.__zxingLoadStatus = (function() {
    if (typeof ZXing === 'undefined') return 'ZXing global missing entirely';
    if (typeof ZXing.BrowserMultiFormatReader !== 'function') return 'BrowserMultiFormatReader missing from ZXing';
    return 'ok';
  })();
</script>
<style>
  :root {
    --ink: #2d3a42;
    --paper: #f4f8fb;
    --cream: #e8f2f8;
    --accent: #ed6840;
    --accent2: #67b656;
    --blue: #7dbce8;
    --purple: #bb82b8;
    --pink: #f4a8a8;
    --muted: #8fa5b5;
    --card: #ffffff;
    --border: #d4e6f1;
    --shadow: 0 2px 16px rgba(70,120,160,0.08);
    --shadow-lg: 0 8px 32px rgba(70,120,160,0.14);
    --r: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100dvh;
    overscroll-behavior: none;
  }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100dvh; flex-direction: column; }
  .screen.active { display: flex; }

  /* ── HEADER ── */
  .header {
    background: #7dbce8;
    color: #ffffff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title { font-family: 'DM Serif Display', serif; font-size: 1.2rem; flex: 1; }
  .header-sub { font-size: 0.75rem; opacity: 0.6; margin-top: 1px; }
  .btn-back {
    background: rgba(255,255,255,0.12);
    border: none;
    color: var(--paper);
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .lang-toggle {
    background: rgba(255,255,255,0.12);
    border: none;
    color: var(--paper);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    font-weight: 500;
  }

  /* ── BUTTONS ── */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 20px;
    border-radius: var(--r);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: #7dbce8; color: white; }
  .btn-accent { background: #ed6840; color: white; }
  .btn-accent2 { background: #67b656; color: white; font-weight: 600; }
  .btn-outline { background: transparent; color: var(--ink); border: 1.5px solid var(--border); }
  .btn-full { width: 100%; }
  .btn-lg { padding: 18px 24px; font-size: 1.05rem; }

  /* ── CARDS ── */
  .card {
    background: var(--card);
    border-radius: var(--r);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  /* ── FORMS ── */
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.04em; text-transform: uppercase; }
  .field input, .field select {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: var(--r);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    background: var(--card);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--ink); }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--ink); color: var(--paper);
    padding: 12px 20px; border-radius: 24px;
    font-size: 0.9rem; font-weight: 500;
    z-index: 9999; transition: transform 0.3s;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }


  /* ── THEMES ── */
  body.theme-sobber {
    --ink: #2c2c2c;
    --paper: #f8f8f8;
    --cream: #efefef;
    --accent: #c0392b;
    --accent2: #2980b9;
    --muted: #888;
    --card: #ffffff;
    --border: #ddd;
  }

  /* ── RECEIPT ── */
  .receipt-box {
    background: #fff;
    border-radius: var(--r);
    overflow: hidden;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  .receipt-header {
    background: linear-gradient(135deg, #7dbce8, #bb82b8);
    padding: 20px;
    text-align: center;
    color: white;
  }
  .receipt-logo { font-family: 'DM Serif Display', serif; font-size: 1.4rem; margin-bottom: 2px; }
  .receipt-date { font-size: 0.8rem; opacity: 0.85; }
  .receipt-customer { padding: 14px 16px; border-bottom: 1px solid var(--border); background: #f9f9f9; }
  .receipt-customer-name { font-weight: 600; font-size: 1rem; }
  .receipt-customer-sub { font-size: 0.82rem; color: var(--muted); }
  .receipt-items { padding: 12px 16px; }
  .receipt-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
  .receipt-item:last-child { border-bottom: none; }
  .receipt-totals { border-top: 1.5px solid var(--border); }
  .receipt-row { display: flex; justify-content: space-between; padding: 10px 16px; font-size: 0.9rem; }
  .receipt-row.discount { background: #eaf6e7; color: #67b656; font-weight: 500; }
  .receipt-row.total { background: #f4f8fb; font-weight: 700; font-size: 1.05rem; padding: 14px 16px; }
  .receipt-swish { background: #eef7fd; border-top: 1.5px solid #b8ddf2; padding: 14px 16px; text-align: center; }
  .receipt-swish-label { font-size: 0.78rem; color: #5a9ec0; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .receipt-swish-num { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: var(--ink); }
  .receipt-swish-ref { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }
  .receipt-photo-hint { text-align: center; color: var(--muted); font-size: 0.82rem; padding: 10px; }

  /* ── LOADING ── */
  #loading {
    position: fixed; inset: 0;
    background: var(--paper);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9998;
    gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ══════════════════════════════════════════════
     SCREEN 1 — LANGUAGE / START
  ══════════════════════════════════════════════ */
  #screen-lang {
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    gap: 32px;
    background: var(--ink);
  }
  .logo-area { text-align: center; }
  .logo-area img.kg-logo { width: 80px; height: 80px; object-fit: contain; margin-bottom: 10px; }
  .logo-area img.kg-text { width: 200px; object-fit: contain; margin-bottom: 6px; filter: brightness(0.2) saturate(0); opacity: 0.85; }
  .logo-area p { color: #8fa5b5; font-size: 0.88rem; letter-spacing: 0.04em; }
  .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 320px; }
  .lang-btn {
    background: #ffffff;
    border: 1.5px solid #d4e6f1;
    border-radius: var(--r);
    color: #2d3a42;
    box-shadow: 0 2px 12px rgba(70,120,160,0.10);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .lang-btn:active { background: rgba(255,255,255,0.2); }
  .lang-btn .flag { font-size: 2rem; display: block; margin-bottom: 6px; }
  .lang-btn .lname { font-size: 0.9rem; font-weight: 500; }

  /* ══════════════════════════════════════════════
     SCREEN 2 — LOGIN
  ══════════════════════════════════════════════ */
  #screen-login { padding: 0; }
  .login-body { padding: 24px; flex: 1; display: flex; flex-direction: column; gap: 16px; }
  .welcome-text { font-family: 'DM Serif Display', serif; font-size: 1.6rem; color: var(--ink); }
  .customer-list { display: flex; flex-direction: column; gap: 8px; }
  .customer-item {
    background: var(--card);
    border-radius: var(--r);
    padding: 16px 20px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: var(--shadow);
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.15s;
  }
  .customer-item:active { border-color: var(--ink); }
  .customer-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: #f0e8f5;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 1rem; color: #bb82b8;
    flex-shrink: 0;
  }
  .customer-name { font-weight: 500; }
  .customer-arrow { margin-left: auto; color: var(--muted); }
  .pin-section { margin-top: 8px; }
  .pin-label { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; }
  .pin-input {
    width: 100%; padding: 14px; text-align: center;
    font-size: 1.4rem; letter-spacing: 8px;
    border: 1.5px solid var(--border); border-radius: var(--r);
    font-family: 'DM Sans', sans-serif;
    outline: none;
  }
  .pin-input:focus { border-color: var(--ink); }

  /* ══════════════════════════════════════════════
     SCREEN 3 — SHOP (kund)
  ══════════════════════════════════════════════ */
  #screen-shop { }
  .shop-tabs {
    background: #ffffff;
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    gap: 4px;
    overflow-x: auto;
  }
  .shop-tab {
    padding: 12px 16px;
    border: none; background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }
  .shop-tab.active { color: #7dbce8; border-bottom-color: #7dbce8; font-weight: 600; }
  .shop-content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 100px; }
  .product-grid { display: flex; flex-direction: column; gap: 10px; }
  .product-card {
    background: var(--card);
    border-radius: var(--r);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: var(--shadow);
  }
  .product-icon {
    width: 48px; height: 48px; border-radius: 10px;
    background: var(--cream);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; flex-shrink: 0;
  }
  .product-info { flex: 1; min-width: 0; }
  .product-name { font-weight: 500; font-size: 0.95rem; }
  .product-name-en { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }
  .product-price { font-size: 0.9rem; color: var(--accent2); font-weight: 600; margin-top: 2px; }
  .stock-pill {
    font-size: 0.72rem; padding: 2px 8px; border-radius: 20px;
    background: var(--cream); color: var(--muted); margin-top: 4px; display: inline-block;
  }
  .stock-pill.low { background: #fff0ed; color: #ed6840; }
  .qty-control { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .qty-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: 1.5px solid var(--border); background: var(--card);
    font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
  }
  .qty-btn:active { background: var(--cream); }
  .qty-val { font-weight: 600; font-size: 1rem; min-width: 20px; text-align: center; }

  /* Cart bar */
  .cart-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #7dbce8;
    padding: 12px 20px;
    display: flex; align-items: center; gap: 12px;
    z-index: 50;
    transform: translateY(100%);
    transition: transform 0.3s;
  }
  .cart-bar.visible { transform: translateY(0); }
  .cart-bar-info { flex: 1; color: var(--paper); }
  .cart-bar-items { font-size: 0.8rem; opacity: 0.6; }
  .cart-bar-total { font-weight: 600; font-size: 1.1rem; }
  .cart-bar-btn {
    background: #ed6840;
    color: white; border: none;
    padding: 12px 20px; border-radius: var(--r);
    font-family: 'DM Sans', sans-serif;
    font-weight: 600; font-size: 0.95rem;
    cursor: pointer;
  }

  /* Scanner */
  #scanner-container {
    width: 100%; max-height: 260px; overflow: hidden;
    border-radius: var(--r);
    background: #000;
    position: relative;
    margin-bottom: 12px;
  }
  #scanner-container video { width: 100%; display: block; }
  .scan-line {
    position: absolute; left: 10%; right: 10%;
    height: 2px; background: #ed6840;
    animation: scanline 2s ease-in-out infinite;
    top: 50%;
    background: #ed6840;
  }
  @keyframes scanline {
    0%, 100% { top: 30%; }
    50% { top: 70%; }
  }

  /* ══════════════════════════════════════════════
     SCREEN 4 — CART / CHECKOUT
  ══════════════════════════════════════════════ */
  #screen-cart { }
  .cart-content { flex: 1; overflow-y: auto; padding: 16px; }
  .cart-item {
    background: var(--card);
    border-radius: var(--r);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
  }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-weight: 500; }
  .cart-item-sub { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }
  .cart-item-price { font-weight: 600; color: var(--accent2); }
  .remove-btn {
    background: none; border: none; color: var(--muted);
    font-size: 1.2rem; cursor: pointer; padding: 4px;
  }
  .cart-total-row {
    background: var(--cream);
    border-radius: var(--r);
    padding: 16px 20px;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .cart-total-label { font-weight: 500; color: var(--muted); }
  .cart-total-amount { font-family: 'DM Serif Display', serif; font-size: 1.8rem; }
  .swish-box {
    background: #eef7fd;
    border: 1.5px solid #b8ddf2;
    border-radius: var(--r);
    padding: 16px 20px;
    margin-bottom: 16px;
  }
  .swish-box h3 { font-size: 0.85rem; font-weight: 600; color: #5a9ec0; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .swish-number { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--ink); }
  .swish-ref { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }

  /* ══════════════════════════════════════════════
     SCREEN 5 — ADMIN
  ══════════════════════════════════════════════ */
  #screen-admin { }
  .admin-content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 40px; }
  .admin-section { margin-bottom: 24px; }
  .section-title {
    font-size: 0.78rem; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 12px;
  }
  .order-card {
    background: var(--card);
    border-radius: var(--r);
    box-shadow: var(--shadow);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .order-header {
    padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .order-badge {
    padding: 3px 10px; border-radius: 20px;
    font-size: 0.75rem; font-weight: 600;
  }
  .badge-pending { background: #fff3e0; color: #c47a00; }
  .badge-done { background: #edf7f0; color: var(--accent2); }
  .order-customer { font-weight: 600; flex: 1; }
  .order-time { font-size: 0.78rem; color: var(--muted); }
  .order-body { padding: 12px 16px; }
  .order-items-list { font-size: 0.9rem; color: var(--muted); margin-bottom: 10px; }
  .order-total { font-weight: 700; font-size: 1.1rem; color: var(--ink); }
  .confirm-btn {
    background: #67b656; color: white; border: none;
    padding: 10px 16px; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-weight: 500; font-size: 0.9rem;
    cursor: pointer; width: 100%; margin-top: 8px;
  }

  .stock-overview { display: flex; flex-direction: column; gap: 8px; }
  .stock-row {
    background: var(--card); border-radius: var(--r);
    padding: 12px 16px; box-shadow: var(--shadow);
  }
  .stock-row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .stock-row-name { font-weight: 600; }
  .stock-items { display: flex; flex-wrap: wrap; gap: 6px; }
  .stock-pill-admin {
    padding: 4px 10px; border-radius: 20px;
    font-size: 0.8rem; background: var(--cream);
  }
  .stock-pill-admin.low { background: #fff0ed; color: var(--accent); font-weight: 600; }

  .admin-tabs {
    background: #ffffff;
    display: flex;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .admin-tab {
    padding: 14px 18px;
    border: none; background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem; color: var(--muted);
    cursor: pointer; white-space: nowrap;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }
  .admin-tab.active { color: #7dbce8; border-bottom-color: #7dbce8; font-weight: 600; }

  .form-card { background: var(--card); border-radius: var(--r); padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px; }

  /* Settings screen link */
  .settings-link {
    position: absolute; top: 14px; right: 60px;
    background: rgba(255,255,255,0.12);
    border: none; color: var(--paper);
    width: 36px; height: 36px; border-radius: 50%;
    font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p style="color:var(--muted);font-size:0.9rem" id="loading-text">Laddar...</p>
</div>

<div id="toast"></div>

<!-- ══ SCREEN: LANGUAGE ══ -->

async function init() {
  document.getElementById('loading-text').textContent = t('loading');

  // Failsafe — hide loading after 8 seconds no matter what
  const failsafe = setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    toast('Anslutning tog lång tid — laddar om...');
  }, 8000);

  if (!SCRIPT_URL) {
    appData = getDemoData();
    clearTimeout(failsafe);
    document.getElementById('loading').style.display = 'none';
    return;
  }
  try {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();
    if (data.products) {
      appData = data;
      if (!appData.stock) appData.stock = [];
      if (!appData.orders) appData.orders = [];
      if (!appData.customers) appData.customers = [];
    } else {
      appData = getDemoData();
    }
  } catch (e) {
    appData = getDemoData();
    toast('Offline — använder lokal data');
  }
  clearTimeout(failsafe);
  document.getElementById('loading').style.display = 'none';
}

function renderProductCard(p) {
  const stock = getCustomerStock(p.ProduktID);
  const qty = getCartQty(p.ProduktID);
  const icon = CATEGORY_ICONS[p.Kategori] || '📦';

  const origPrice = Number(p.Pris);
  const discPrice = Math.round(origPrice * (1 - DISCOUNT));
  const iconHtml = p.Bild ? `<img src="${p.Bild}" style="width:100%;height:100%;object-fit:cover;border-radius:10px">` : icon;
  return `
    <div class="product-card">
      <div class="product-icon">${iconHtml}</div>
      <div class="product-info">
        <div class="product-name">${name}</div>
        ${p.NamnEN && lang === 'sv' ? `<div class="product-name-en">${p.NamnEN}</div>` : ''}
        <div class="product-price">
          <span style="text-decoration:line-through;color:var(--muted);font-weight:400;font-size:0.82rem">${origPrice} ${t('kr')}</span>
          <span style="margin-left:6px">${discPrice} ${t('kr')}</span>
          <span style="margin-left:4px;background:#eaf6e7;color:#67b656;font-size:0.72rem;padding:2px 6px;border-radius:10px;font-weight:600">-10%</span>
        </div>
        <span class="stock-pill ${stockClass}">${stockLabel}</span>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty('${p.ProduktID}',-1)" ${qty===0?'style="opacity:0.3"':''}>−</button>
        <span class="qty-val">${qty}</span>
        <button class="qty-btn" onclick="changeQty('${p.ProduktID}',1)" ${stock===0?'disabled style="opacity:0.3"':''}>+</button>
      </div>
    </div>
  `;
}

function renderReturnCard(p) {
  const retItem = returns.find(i => i.productId === p.ProduktID);
  const qty = retItem ? retItem.quantity : 0;
  const name = lang === 'en' && p.NamnEN ? p.NamnEN : p.Namn;
  return `
    <div class="product-card">
      <div class="product-icon">${CATEGORY_ICONS[p.Kategori] || '📦'}</div>
      <div class="product-info">
        <div class="product-name">${name}</div>
        <div class="product-price">${p.Pris} ${t('kr')}</div>
      </div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeReturn('${p.ProduktID}',-1)" ${qty===0?'style="opacity:0.3"':''}>−</button>
        <span class="qty-val">${qty}</span>
        <button class="qty-btn" onclick="changeReturn('${p.ProduktID}',1)">+</button>
      </div>
    </div>
  `;
}

function changeQty(productId, delta) {
  const product = appData.products.find(p => p.ProduktID === productId);
  const stock = getCustomerStock(productId);
  const discPrice = Math.round(Number(product.Pris) * (1 - DISCOUNT));
  const idx = cart.findIndex(i => i.productId === productId);
  if (idx === -1) {
    if (delta > 0 && stock > 0) {
      cart.push({ productId, name: product.Namn, nameEn: product.NamnEN, price: discPrice, origPrice: Number(product.Pris), quantity: 1 });
    }
  } else {
    cart[idx].quantity += delta;
    if (cart[idx].quantity <= 0) cart.splice(idx, 1);
    if (cart[idx] && cart[idx].quantity > stock) cart[idx].quantity = stock;
  }
  renderShopContent();
}

function changeReturn(productId, delta) {
  const product = appData.products.find(p => p.ProduktID === productId);
  const idx = returns.findIndex(i => i.productId === productId);
  if (idx === -1) {
    if (delta > 0) returns.push({ productId, name: product.Namn, nameEn: product.NamnEN, price: Number(product.Pris), quantity: 1 });
  } else {
    returns[idx].quantity += delta;
    if (returns[idx].quantity <= 0) returns.splice(idx, 1);
  }
  renderShopContent();
}

function updateCartBar() {
  const bar = document.getElementById('cart-bar');
  const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
  const count = cart.reduce((s, i) => s + i.quantity, 0);
  if (count === 0) { bar.classList.remove('visible'); return; }
  bar.classList.add('visible');
  document.getElementById('cart-bar-items').textContent = `${count} ${t('each')}`;
  document.getElementById('cart-bar-total').textContent = `${total} ${t('kr')}`;
  document.getElementById('cart-btn-label').textContent = t('checkout');
}

// ─── SCANNER (ZXing native continuous decode — same approach as the painter order app) ───
let zxingReader = null;
let lastScannedCode = '';
let lastScannedTime = 0;
let scanVideoEl = null;

let currentStream = null;
let torchOn = false;
let scanFrameCount = 0;
let scanLastError = '';

async function startScanner() {
  if (scannerActive) return;
  scannerActive = true;
  scanFrameCount = 0;
  scanLastError = '';

  const debugEl = document.getElementById('scan-debug');

  if (window.__zxingLoadStatus !== 'ok') {
    toast('ZXing laddades inte korrekt: ' + window.__zxingLoadStatus);
    if (debugEl) debugEl.textContent = 'FEL: ' + window.__zxingLoadStatus;
    scannerActive = false;
    return;
  }

  try {
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.EAN_13,
      ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.CODE_128,
      ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.UPC_A,
      ZXing.BarcodeFormat.UPC_E,
    ]);

    zxingReader = new ZXing.BrowserMultiFormatReader(hints);

    const container = document.getElementById('scanner-container');
    const video = document.createElement('video');
    video.style.width = '100%';
    video.style.display = 'block';
    video.setAttribute('playsinline', true);
    video.setAttribute('muted', true);
    video.muted = true;
    container.appendChild(video);
    scanVideoEl = video;

    const constraints = {
      video: { facingMode: { ideal: 'environment' } }
    };

    // decodeFromConstraints handles getUserMedia + the continuous scan loop internally —
    // this is ZXing's own native continuous-scan API.
    zxingReader.decodeFromConstraints(constraints, video, (result, err) => {
      scanFrameCount++;
      if (result) {
        handleScanResult(result.getText());
      }
      if (err && err.name && err.name !== 'NotFoundException') {
        scanLastError = err.name;
      }
      if (debugEl && scanFrameCount % 10 === 0) {
        debugEl.textContent = 'scans:' + scanFrameCount + ' lastErr:' + (scanLastError || 'inga (normalt)');
      }
    }).then(controls => {
      zxingControls = controls;
      // Try to expose torch button if supported
      try {
        const stream = video.srcObject;
        currentStream = stream;
        const track = stream.getVideoTracks()[0];
        const capabilities = track.getCapabilities ? track.getCapabilities() : {};
        if (capabilities.torch) {
          document.getElementById('torch-btn').style.display = 'inline-flex';
        }
      } catch(e) {}
    }).catch(e => {
      toast('Kunde inte starta skanning: ' + e.message);
      scannerActive = false;
    });

  } catch(e) {
    toast('Kameran kunde inte starta: ' + e.message);
    scannerActive = false;
  }
}

let zxingControls = null;

async function toggleTorch() {
  if (!currentStream) return;
  try {
    const track = currentStream.getVideoTracks()[0];
    torchOn = !torchOn;
    await track.applyConstraints({ advanced: [{ torch: torchOn }] });
    toast(torchOn ? '🔦 Belysning på' : 'Belysning av');
  } catch(e) {
    toast('Belysning stöds inte på denna enhet');
  }
}

let scanPaused = false;

function handleScanResult(code) {
  if (scanPaused) return;

  const now = Date.now();
  if (code === lastScannedCode && now - lastScannedTime < 4000) return;
  lastScannedCode = code;
  lastScannedTime = now;

  const product = appData.products.find(p => {
    const codes = String(p.Streckkod).split(',').map(c => c.trim());
    return codes.includes(String(code).trim());
  });
  if (product) {
    changeQty(product.ProduktID, 1);
    toast('+ ' + (lang === 'en' && product.NamnEN ? product.NamnEN : product.Namn));
    const el = document.getElementById('scanned-results');
    if (el) el.innerHTML = renderProductCard(product);
    if (navigator.vibrate) navigator.vibrate(100);
  } else {
    toast('Streckkod: ' + code + ' — ej i sortimentet');
  }

  // Pause scanning for 1.5s after any successful read — gives time to move the camera away
  scanPaused = true;
  setTimeout(() => { scanPaused = false; }, 1500);
}

function stopScanner() {
  if (!scannerActive) return;
  scannerActive = false;
  try {
    if (zxingControls) {
      zxingControls.stop();
      zxingControls = null;
    }
    if (zxingReader) {
      zxingReader.reset();
      zxingReader = null;
    }
    const container = document.getElementById('scanner-container');
    if (container) {
      const videos = container.querySelectorAll('video');
      videos.forEach(v => {
        if (v.srcObject) {
          v.srcObject.getTracks().forEach(t => t.stop());
        }
        v.remove();
      });
    }
    scanVideoEl = null;
    currentStream = null;
    torchOn = false;
    const torchBtn = document.getElementById('torch-btn');
    if (torchBtn) torchBtn.style.display = 'none';
  } catch(e) {}
  lastScannedCode = '';
  scanPaused = false;
}

  cart = cart.filter(i => i.productId !== productId);
  renderCart();
  updateCartBar();

async function placeOrder() {
  if (!currentCustomer || cart.length === 0) return;
  const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
  const origTotal = cart.reduce((s, i) => s + (i.origPrice || i.price) * i.quantity, 0);
  const order = {
    action: 'saveOrder',
    customerId: currentCustomer.KundID,
    customerName: currentCustomer.Namn,
    items: cart.map(i => ({ productId: i.productId, name: i.name, quantity: i.quantity, price: i.price })),
    total
  };

  // Update local stock
  cart.forEach(item => {
    const row = appData.stock.find(s => s.KundID === currentCustomer.KundID && s.ProduktID === item.productId);
    if (row) row.Antal = Math.max(0, Number(row.Antal) - item.quantity);
  });

  // Save to orders list locally
  appData.orders.push({ ...order, OrderID: 'ORD-' + Date.now(), Timestamp: new Date().toISOString(), Status: 'Väntande', Items: JSON.stringify(order.items) });

  // Try to sync
  if (SCRIPT_URL) {
    try { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(order) }); } catch(e){}
  }

  const completedOrder = { ...order, OrderID: 'ORD-' + Date.now(), Timestamp: new Date().toISOString() };
  lastOrder = completedOrder;
  lastOrderOrig = origTotal;
  cart = [];
  showReceiptScreen(completedOrder, total, origTotal);
}

let lastOrder = null;
let lastOrderOrig = 0;
let pendingProductImage = '';

function showReceiptScreen(order, total, origTotal) {
  const saved = origTotal - total;

async function sendReceiptEmail() {
  const email = document.getElementById('receipt-email').value.trim();
  if (!email || !email.includes('@')) { toast('Ange en giltig e-postadress'); return; }
  if (!lastOrder) return;
  const total = lastOrder.total;
  const origTotal = lastOrderOrig;
  const saved = origTotal - total;
  const swishNum = localStorage.getItem('swishNumber') || '070-000 00 00';
  const ref = currentCustomer ? currentCustomer.SwishRef : '';
  
  if (SCRIPT_URL) {
    try {
      await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({
        action: 'sendReceipt',
        email,
        customerName: currentCustomer.Namn,
        orderId: lastOrder.OrderID,
        items: lastOrder.items,
        total,
        origTotal,
        saved,
        swishNum,
        swishRef: ref
      })});
      toast('✓ Kvitto skickat!');
    } catch(e) { toast('Kunde inte skicka — försök igen'); }
  } else {
    toast('✓ Kvitto skickat! (demo)');
  }
}

function finishOrder() {
  lastOrder = null;
  currentCustomer = null;
  returns = [];
  showScreen('screen-lang');
}

async function submitReturn() {
  if (!currentCustomer || returns.length === 0) return;
  // Update local stock
  returns.forEach(item => {
    const row = appData.stock.find(s => s.KundID === currentCustomer.KundID && s.ProduktID === item.productId);
    if (row) row.Antal = Number(row.Antal) + item.quantity;
  });
  if (SCRIPT_URL) {
    try {
      await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'updateStock', customerId: currentCustomer.KundID, items: returns.map(i => ({ productId: i.productId, quantity: i.quantity })), direction: 'add' }) });
    } catch(e){}
  }
  returns = [];
  toast(t('returnSent'));
  renderShopContent();
}

function confirmLeave() {

  cart = []; returns = [];
  showScreen('screen-lang');
}

function renderAdminStock() {
  const customerOptions = appData.customers.map(c => '<option value="' + c.KundID + '">' + c.Namn + '</option>').join('');
  const productOptions = appData.products.map(p => '<option value="' + p.ProduktID + '">' + p.Namn + '</option>').join('');

  const byCustomer = {};
  appData.customers.forEach(c => { byCustomer[c.KundID] = { name: c.Namn, items: [] }; });
  appData.stock.forEach(s => {

  });

  const overviewHtml = Object.entries(byCustomer).map(([id, c]) => {
    const pills = c.items.length === 0
      ? '<span style="color:var(--muted);font-size:0.85rem">Inga produkter</span>'

function updateCurrentStock() {
  const custId = document.getElementById('sl-customer') && document.getElementById('sl-customer').value;
  const prodId = document.getElementById('sl-product') && document.getElementById('sl-product').value;
  if (!custId || !prodId) return;
  const row = appData.stock.find(s => s.KundID === custId && s.ProduktID === prodId);
  const current = row ? Number(row.Antal) : 0;
  const el = document.getElementById('sl-current');
  if (el) el.textContent = 'Nuvarande lager: ' + current + ' st';
  const qty = document.getElementById('sl-qty');
  if (qty) qty.value = current;
}

function prefillStock(custId, prodId) {
  const custSel = document.getElementById('sl-customer');
  const prodSel = document.getElementById('sl-product');
  if (custSel) custSel.value = custId;
  if (prodSel) prodSel.value = prodId;
  updateCurrentStock();
  document.querySelector('.form-card').scrollIntoView({ behavior: 'smooth' });
}

async function adminSetStock() {
  const custId = document.getElementById('sl-customer').value;
  const prodId = document.getElementById('sl-product').value;
  const qty = Number(document.getElementById('sl-qty').value);
  if (!custId || !prodId || isNaN(qty) || qty < 0) return toast('Fyll i alla fält');

  const row = appData.stock.find(s => s.KundID === custId && s.ProduktID === prodId);
  if (row) {
    row.Antal = qty;
  } else {
    const cust = appData.customers.find(c => c.KundID === custId);
    const prod = appData.products.find(p => p.ProduktID === prodId);
    appData.stock.push({ KundID: custId, KundNamn: cust ? cust.Namn : '', ProduktID: prodId, ProduktNamn: prod ? prod.Namn : '', Antal: qty });
  }

  if (SCRIPT_URL) {
    try {
      await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'setStock', customerId: custId, productId: prodId, quantity: qty }) });
    } catch(e) {}
  }

  toast('✓ Lager uppdaterat');
  renderAdminContent('stock');
}

let pendingEditImage = '';

function editProduct(id) {
  const p = appData.products.find(x => x.ProduktID === id);

  document.getElementById('ep-name').value = p.Namn;
  document.getElementById('ep-nameen').value = p.NamnEN || '';

function closeEditProduct() {
  document.getElementById('edit-product-overlay').style.display = 'none';
  pendingEditImage = '';

async function handleEditImageSelect(input) {
  const file = input.files[0];
  if (!file) return;
  const preview = document.getElementById('ep-image-preview');
  preview.innerHTML = '<div class="spinner" style="width:24px;height:24px;border-width:2px"></div>';
  try {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', CLOUDINARY_PRESET);
    const res = await fetch('https://api.cloudinary.com/v1_1/' + CLOUDINARY_CLOUD + '/image/upload', { method: 'POST', body: formData });
    const data = await res.json();
    if (data.secure_url) {
      pendingEditImage = data.secure_url;
      preview.innerHTML = '<img src="' + data.secure_url + '" style="width:100%;height:100%;object-fit:cover">';
      toast('✓ Bild uppladdad');
    } else {
      toast('Kunde inte ladda upp bild');
    }
  } catch(e) {
    toast('Fel vid uppladdning');
  }
}

  const image = pendingProductImage;
  if (!name || !price) return toast('Fyll i namn och pris');
  const id = 'P' + Date.now();
  appData.products.push({ ProduktID: id, Namn: name, NamnEN: nameEn, Streckkod: barcode, Pris: price, Enhet: 'st', Kategori: cat, Bild: image });
  appData.customers.forEach(c => {
    appData.stock.push({ KundID: c.KundID, KundNamn: c.Namn, ProduktID: id, ProduktNamn: name, Antal: 0 });
  });
  if (SCRIPT_URL) {
    try { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'addProduct', name, nameEn, barcode, price, unit: 'st', category: cat, image }) }); } catch(e){}
  }
  pendingProductImage = '';
  toast('✓ Produkt tillagd');
  renderAdminContent('products');
}

async function adminAddCustomer() {
  const name = document.getElementById('nc-name').value.trim();
  const email = document.getElementById('nc-email').value.trim();
  const pin = document.getElementById('nc-pin').value.trim();
  const swish = document.getElementById('nc-swish').value.trim();
  if (!name || !pin) return toast('Fyll i namn och PIN');
  const id = 'C' + Date.now();
  appData.customers.push({ KundID: id, Namn: name, Email: email, PIN: pin, SwishRef: swish });
  appData.products.forEach(p => {
    appData.stock.push({ KundID: id, KundNamn: name, ProduktID: p.ProduktID, ProduktNamn: p.Namn, Antal: 0 });
  });
  if (SCRIPT_URL) {
    try { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'addCustomer', name, email, pin, swishRef: swish }) }); } catch(e){}
  }
  toast('✓ Kund tillagd');
  renderAdminContent('customers');
}

async function deleteOrderAdmin(orderId) {
  if (!confirm('Radera denna order permanent?')) return;
  appData.orders = appData.orders.filter(o => (o.OrderID || o.orderId) !== orderId);
  if (SCRIPT_URL) {
    try { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteOrder', orderId }) }); } catch(e){}
  }
  toast('🗑 Order raderad');
  renderAdminContent('orders');
}

async function confirmOrderAdmin(orderId) {
  const order = appData.orders.find(o => (o.OrderID || o.orderId) === orderId);
  if (order) order.Status = 'Klar';
  if (SCRIPT_URL) {
    try { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'confirmOrder', orderId, confirmedBy: 'Admin' }) }); } catch(e){}
  }
  toast(t('confirmOrder'));
  renderAdminContent('orders');
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
function toast(msg, duration = 2200) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// ─── Hook up cart render on screen switch ───
const origShow = window.showScreen;
window.showScreen = function(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id !== 'screen-shop' && scannerActive) stopScanner();
  if (id === 'screen-cart') renderCart();
  if (id === 'screen-login') renderLoginScreen();
};

// ─── PRINT ORDER ───
function printOrder(orderId) {
  const order = appData.orders.find(o => (o.OrderID || o.orderId) === orderId);
  if (!order) return;
  let items = [];
  try { items = JSON.parse(order.Items || order.itemsJson || '[]'); } catch(e){}
  const total = order.total || order.Total || 0;
  const swishNum = localStorage.getItem('swishNumber') || '070-000 00 00';
  const time = order.Timestamp ? new Date(order.Timestamp).toLocaleString('sv-SE') : '';

  const w = window.open('', '_blank');
  w.document.write(`
    <html><head><title>Kvitto ${orderId}</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 400px; margin: 40px auto; padding: 20px; }
      h1 { font-size: 1.4rem; } 
      .row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #eee; }
      .total { font-weight: bold; font-size: 1.1rem; border-top: 2px solid #333; margin-top: 8px; }
      .header { text-align: center; margin-bottom: 20px; }
      .footer { text-align: center; margin-top: 20px; color: #888; font-size: 0.85rem; }
    </style></head><body>
    <div class="header">
      <h1>Keller &amp; Glenn</h1>
      <div>${time}</div>
      <div style="font-size:0.85rem;color:#888">${orderId}</div>
    </div>
    <div><strong>Kund:</strong> ${order.customerName || order.KundNamn}</div>
    <div style="margin-top:12px">
      ${items.map(i => `<div class="row"><span>${i.quantity}× ${i.name}</span><span>${i.price * i.quantity} kr</span></div>`).join('')}
      <div class="row total"><span>Att betala</span><span>${total} kr</span></div>
    </div>
    <div class="footer">Swish: ${swishNum}<br>Tack för ditt köp!</div>
    </body></html>
  `);
  w.document.close();
  w.print();
}

// ─── THEME ───
function toggleTheme() {
  const body = document.body;
  const isKG = !body.classList.contains('theme-sobber');
  if (isKG) {
    body.classList.add('theme-sobber');
    localStorage.setItem('theme', 'sobber');
    toast('Enkelt tema');
  } else {
    body.classList.remove('theme-sobber');
    localStorage.setItem('theme', 'kg');
    toast('Keller & Glenn tema');
  }
}

function applyStoredTheme() {
  if (localStorage.getItem('theme') === 'sobber') {
    document.body.classList.add('theme-sobber');
  }
}

// ─── START ───
applyStoredTheme();
init();
</script>
